<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring Sistem Pompa</title>

  <!-- CSS -->
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83
                   M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
      </div>
      Monitoring Sistem Pompa
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main>

    <!-- Status Sensor Tanah -->
    <div class="section-title">Status Sensor Tanah</div>
    <div class="soil-row">

      <div class="soil-card" id="sc1">
        <div class="soil-title">Sensor 1</div>
        <svg class="soil-art" id="ss1"
             viewBox="0 0 170 116" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="soil-footer">
          <div class="soil-state">Kelembapan Sensor 1</div>
          <div class="soil-badge" id="sb1">—</div>
        </div>
      </div>

      <div class="soil-card" id="sc2">
        <div class="soil-title">Sensor 2</div>
        <svg class="soil-art" id="ss2"
             viewBox="0 0 170 116" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="soil-footer">
          <div class="soil-state">Kelembapan Sensor 2</div>
          <div class="soil-badge" id="sb2">—</div>
        </div>
      </div>

      <div class="soil-card" id="scAvg">
        <div class="soil-title">Rata-rata</div>
        <svg class="soil-art" id="ssAvg"
             viewBox="0 0 170 116" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="soil-footer">
          <div class="soil-state">Kelembapan Rata-rata</div>
          <div class="soil-badge" id="sbAvg">—</div>
        </div>
      </div>

    </div>

    <!-- Status Valve -->
    <div class="section-title">Status Valve</div>
    <div class="valve-row">

      <div class="valve-card" id="vc1">
        <div class="valve-title">Valve 1</div>
        <svg class="valve-art" id="vs1"
             viewBox="0 0 170 116" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="valve-footer">
          <div class="valve-state">Status Valve 1</div>
          <div class="valve-badge" id="vb1">—</div>
        </div>
      </div>

      <div class="valve-card" id="vc2">
        <div class="valve-title">Valve 2</div>
        <svg class="valve-art" id="vs2"
             viewBox="0 0 170 116" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="valve-footer">
          <div class="valve-state">Status Valve 2</div>
          <div class="valve-badge" id="vb2">—</div>
        </div>
      </div>

    </div>

    <div class="footer-ts" id="ts">Menunggu data...</div>

  </main>

  <!-- JavaScript -->
  <script type="module" src="src/js/app.js"></script>

</body>
</html>
